name: Visit Site

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Date to run the workflow"
        required: true
        type: string
        default: "in 1 hour"
jobs:
  visit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npx playwright install --with-deps chromium

      - run: node index.js
