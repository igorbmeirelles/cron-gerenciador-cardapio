name: Visit Site

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  visit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npx playwright install --with-deps chromium

      - run: node check-site.js